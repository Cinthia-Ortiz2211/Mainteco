<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Service Scheduling Calendar</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1754cf",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen w-full flex-col max-w-md mx-auto bg-background-light dark:bg-background-dark overflow-x-hidden shadow-2xl">
<!-- Header -->
<header class="flex items-center px-4 py-6 justify-between sticky top-0 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md z-10">
<button class="text-slate-900 dark:text-slate-100 flex size-10 items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</button>
<h1 class="text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">Schedule Service</h1>
</header>
<!-- Service Info Card -->
<div class="px-4 mb-6">
<div class="bg-white dark:bg-slate-900 p-4 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 flex items-center gap-4">
<div class="size-12 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">home_repair_service</span>
</div>
<div>
<h4 class="font-bold text-slate-900 dark:text-white">General Maintenance</h4>
<p class="text-sm text-slate-500 dark:text-slate-400">Estimated duration: 60 mins</p>
</div>
</div>
</div>
<!-- Date Selection Section -->
<section class="flex flex-col gap-4">
<div class="flex items-center justify-between px-4">
<h3 class="text-lg font-bold leading-tight tracking-tight">Select a Date</h3>
<span class="text-xs font-medium text-slate-400 uppercase tracking-wider">November 2024</span>
</div>
<div class="px-4">
<div class="bg-white dark:bg-slate-900 rounded-2xl p-4 shadow-sm border border-slate-200 dark:border-slate-800">
<!-- Calendar Header -->
<div class="flex items-center justify-between mb-4 px-1">
<button class="size-8 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800">
<span class="material-symbols-outlined text-xl">chevron_left</span>
</button>
<p class="text-sm font-bold">November 2024</p>
<button class="size-8 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800">
<span class="material-symbols-outlined text-xl">chevron_right</span>
</button>
</div>
<!-- Weekdays -->
<div class="grid grid-cols-7 mb-2">
<p class="text-slate-400 text-xs font-bold text-center">S</p>
<p class="text-slate-400 text-xs font-bold text-center">M</p>
<p class="text-slate-400 text-xs font-bold text-center">T</p>
<p class="text-slate-400 text-xs font-bold text-center">W</p>
<p class="text-slate-400 text-xs font-bold text-center">T</p>
<p class="text-slate-400 text-xs font-bold text-center">F</p>
<p class="text-slate-400 text-xs font-bold text-center">S</p>
</div>
<!-- Days Grid -->
<div class="grid grid-cols-7 gap-1">
<!-- Past Days (Grayed Out) -->
<div class="h-10 flex items-center justify-center text-slate-300 dark:text-slate-700 text-sm cursor-not-allowed">27</div>
<div class="h-10 flex items-center justify-center text-slate-300 dark:text-slate-700 text-sm cursor-not-allowed">28</div>
<div class="h-10 flex items-center justify-center text-slate-300 dark:text-slate-700 text-sm cursor-not-allowed">29</div>
<div class="h-10 flex items-center justify-center text-slate-300 dark:text-slate-700 text-sm cursor-not-allowed">30</div>
<div class="h-10 flex items-center justify-center text-slate-300 dark:text-slate-700 text-sm cursor-not-allowed">31</div>
<div class="h-10 flex items-center justify-center text-slate-300 dark:text-slate-700 text-sm cursor-not-allowed">1</div>
<div class="h-10 flex items-center justify-center text-slate-300 dark:text-slate-700 text-sm cursor-not-allowed">2</div>
<div class="h-10 flex items-center justify-center text-slate-300 dark:text-slate-700 text-sm cursor-not-allowed">3</div>
<div class="h-10 flex items-center justify-center text-slate-300 dark:text-slate-700 text-sm cursor-not-allowed">4</div>
<!-- Current Day (Selected) -->
<button class="h-10 flex items-center justify-center text-white bg-primary rounded-full text-sm font-bold shadow-lg shadow-primary/30">5</button>
<!-- Future Days -->
<button class="h-10 flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full text-sm font-medium">6</button>
<button class="h-10 flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full text-sm font-medium">7</button>
<button class="h-10 flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full text-sm font-medium">8</button>
<button class="h-10 flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full text-sm font-medium">9</button>
<button class="h-10 flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full text-sm font-medium">10</button>
<button class="h-10 flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full text-sm font-medium">11</button>
<button class="h-10 flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full text-sm font-medium">12</button>
<button class="h-10 flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full text-sm font-medium">13</button>
<button class="h-10 flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full text-sm font-medium">14</button>
<button class="h-10 flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full text-sm font-medium">15</button>
<button class="h-10 flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full text-sm font-medium">16</button>
<button class="h-10 flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full text-sm font-medium">17</button>
<button class="h-10 flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full text-sm font-medium">18</button>
</div>
</div>
</div>
</section>
<!-- Time Slot Picker -->
<section class="mt-8 px-4 flex flex-col gap-4">
<h3 class="text-lg font-bold leading-tight tracking-tight">Available Time Slots</h3>
<div class="grid grid-cols-3 gap-3">
<button class="flex flex-col items-center justify-center py-3 px-2 rounded-xl bg-primary/10 border-2 border-primary text-primary">
<span class="text-sm font-bold">09:00 AM</span>
<span class="text-[10px] font-medium opacity-70">Morning</span>
</button>
<button class="flex flex-col items-center justify-center py-3 px-2 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 hover:border-primary/50 transition-all">
<span class="text-sm font-bold">10:30 AM</span>
<span class="text-[10px] font-medium text-slate-500 opacity-70">Morning</span>
</button>
<button class="flex flex-col items-center justify-center py-3 px-2 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 hover:border-primary/50 transition-all">
<span class="text-sm font-bold">01:00 PM</span>
<span class="text-[10px] font-medium text-slate-500 opacity-70">Afternoon</span>
</button>
<button class="flex flex-col items-center justify-center py-3 px-2 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 hover:border-primary/50 transition-all">
<span class="text-sm font-bold">02:30 PM</span>
<span class="text-[10px] font-medium text-slate-500 opacity-70">Afternoon</span>
</button>
<button class="flex flex-col items-center justify-center py-3 px-2 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 hover:border-primary/50 transition-all">
<span class="text-sm font-bold">04:00 PM</span>
<span class="text-[10px] font-medium text-slate-500 opacity-70">Evening</span>
</button>
<button class="flex flex-col items-center justify-center py-3 px-2 rounded-xl bg-slate-100 dark:bg-slate-800 border border-transparent opacity-50 cursor-not-allowed">
<span class="text-sm font-bold text-slate-400">05:30 PM</span>
<span class="text-[10px] font-medium text-slate-400 opacity-70">Booked</span>
</button>
</div>
</section>
<!-- Summary & Action -->
<div class="mt-auto p-4 pb-8 space-y-4">
<div class="flex items-center justify-between px-2">
<div class="flex flex-col">
<span class="text-xs text-slate-500 uppercase tracking-wide">Status</span>
<span class="text-sm font-bold text-amber-500 flex items-center gap-1">
<span class="material-symbols-outlined text-sm">schedule</span> Pending
                    </span>
</div>
<div class="text-right">
<span class="text-xs text-slate-500 uppercase tracking-wide">Appointment</span>
<p class="text-sm font-bold">Nov 5 • 09:00 AM</p>
</div>
</div>
<button class="w-full bg-primary text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 hover:scale-[0.98] active:scale-95 transition-all">
                Confirm Appointment
            </button>
</div>
<!-- Home Indicator (iOS style) -->
<div class="flex justify-center pb-2">
<div class="w-32 h-1.5 bg-slate-300 dark:bg-slate-700 rounded-full"></div>
</div>
</div>
</body></html>
